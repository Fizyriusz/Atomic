<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear Commander - Multi-Nuke Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --red: #ff3333; --orange: #ff9900; --yellow: #ffff00; --bg: #0f0f11; }
        body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; background: var(--bg); color: #00ff00; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }

        /* Tactical UI */
        #ui {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(15, 15, 17, 0.95); border: 2px solid #333;
            padding: 15px; border-radius: 4px; width: 280px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        h2 { margin: 0 0 10px; font-size: 1rem; color: var(--red); text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .section { margin-bottom: 15px; }
        label { font-size: 0.75rem; color: #888; display: block; margin-bottom: 5px; }
        
        select, input, button {
            width: 100%; background: #1a1a1a; border: 1px solid #444; color: #00ff00;
            padding: 8px; margin-bottom: 5px; border-radius: 2px; box-sizing: border-box;
        }

        .wind-control { display: flex; align-items: center; gap: 10px; }
        #wind-compass { font-weight: bold; color: var(--yellow); min-width: 40px; text-align: center; }

        button { background: #333; cursor: pointer; transition: 0.2s; font-weight: bold; border-color: #555; }
        button:hover { background: #444; border-color: var(--red); }
        .btn-clear { color: #ff5555; border-color: #552222; margin-top: 10px; }

        .stats-box { 
            font-size: 0.7rem; background: #000; padding: 8px; border: 1px solid #222; 
            max-height: 150px; overflow-y: auto; color: #00cc00;
        }

        /* Tooltip style */
        .leaflet-popup-content { background: #111; color: #fff; font-family: monospace; }
    </style>
</head>
<body>

<div id="ui">
    <h2>NUCLEAR COMMANDER v3.0</h2>
    
    <div class="section">
        <label>WYBÓR GŁOWICY:</label>
        <select id="bomb-preset" onchange="updateYieldFromPreset()">
            <option value="15">Little Boy (15 kt)</option>
            <option value="350">W78 Minuteman (350 kt)</option>
            <option value="50000">Tsar Bomba (50 Mt)</option>
            <option value="custom">WŁASNA MOC --></option>
        </select>
        <input type="number" id="custom-yield" placeholder="Moc w kilotonach (kt)" value="15">
    </div>

    <div class="section">
        <label>KIERUNEK WIATRU (DOKĄD WIEJE):</label>
        <div class="wind-control">
            <input type="range" id="wind-dir" min="0" max="360" value="90">
            <span id="wind-compass">W</span>
        </div>
    </div>

    <div class="stats-box" id="log">CELOWNIK GOTOWY. KLIKNIJ NA MAPIE.</div>

    <button class="btn-clear" onclick="clearAll()">WYCZYŚĆ WSZYSTKIE ŚLADY</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Inicjalizacja Mapy
    const map = L.map('map', { zoomControl: false }).setView([52.23, 21.01], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CartoDB'
    }).addTo(map);

    let activeObjects = [];
    const windInput = document.getElementById('wind-dir');
    const windCompass = document.getElementById('wind-compass');
    const logBox = document.getElementById('log');

    // Róża wiatrów - etykiety
    const getWindLabel = (deg) => {
        const labels = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
        return labels[Math.round(deg / 45) % 8];
    };

    windInput.oninput = () => {
        windCompass.innerText = getWindLabel(windInput.value);
    };

    function updateYieldFromPreset() {
        const preset = document.getElementById('bomb-preset').value;
        if(preset !== 'custom') {
            document.getElementById('custom-yield').value = preset;
        }
    }

    function playExplosionSound() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const bufferSize = audioCtx.sampleRate * 1.5;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(500, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 1.5);
        
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
    }

    map.on('click', function(e) {
        const yieldKt = parseFloat(document.getElementById('custom-yield').value) || 1;
        const latlng = e.latlng;
        const windDeg = parseFloat(windInput.value);

        // PRAWA SKALOWANIA (NUKEMAP Logic)
        // Blast scale: Y^(1/3), Thermal scale: Y^(1/2)
        const scaleBlast = Math.pow(yieldKt, 1/3);
        const scaleThermal = Math.pow(yieldKt, 0.49); // Uproszczone skalowanie cieplne

        const zones = {
            fireball: scaleBlast * 180,    // Kula ognia
            heavy: scaleBlast * 450,       // 20 PSI - Beton paruje
            moderate: scaleBlast * 1600,   // 5 PSI - Domy zburzone
            light: scaleBlast * 4800,      // 1 PSI - Szyby pękają
            thermal: scaleThermal * 2000   // 3 stopień oparzeń
        };

        // Shake map
        document.getElementById('map').classList.add('shake');
        setTimeout(() => document.getElementById('map').classList.remove('shake'), 500);
        playExplosionSound();

        // Rysowanie Falloutu
        const angleRad = (windDeg - 90) * (Math.PI / 180);
        const falloutLen = scaleBlast * 8000;
        const endLat = latlng.lat - (falloutLen / 111320) * Math.sin(angleRad);
        const endLng = latlng.lng + (falloutLen / (111320 * Math.cos(latlng.lat * Math.PI/180))) * Math.cos(angleRad);
        
        const fallout = L.polygon([
            latlng,
            [latlng.lat + (zones.light/111000), latlng.lng], // Szerokość u nasady
            [endLat, endLng],
            [latlng.lat - (zones.light/111000), latlng.lng]
        ], {color: '#6b8e23', fillOpacity: 0.2, weight: 1}).addTo(map);

        // Funkcja pomocnicza do okręgów
        const drawCircle = (radius, color, label) => {
            const c = L.circle(latlng, {
                radius: 0, color: color, fillColor: color, fillOpacity: 0.25, weight: 1
            }).addTo(map).bindTooltip(label);
            setTimeout(() => c.setRadius(radius), 50);
            activeObjects.push(c);
            return c;
        };

        drawCircle(zones.light, '#555', '1 PSI: Szyby pękają, podmuch odczuwalny');
        drawCircle(zones.thermal, '#ff9900', 'Ciepło: Oparzenia 3 stopnia');
        drawCircle(zones.moderate, '#ff4400', '5 PSI: Budynki mieszkalne zburzone');
        drawCircle(zones.heavy, '#ff0000', '20 PSI: Totalna destrukcja betonu');
        drawCircle(zones.fireball, '#ffff00', 'Kula ognia: Parowanie materii');

        activeObjects.push(fallout);

        // Log
        const entry = document.createElement('div');
        entry.innerHTML = `> Detonacja ${yieldKt}kt w [${latlng.lat.toFixed(2)}, ${latlng.lng.toFixed(2)}]`;
        logBox.prepend(entry);
    });

    function clearAll() {
        activeObjects.forEach(obj => map.removeLayer(obj));
        activeObjects = [];
        logBox.innerHTML = "MAPA WYCZYSZCZONA.";
    }
</script>

<style>
    /* Dynamiczne trzęsienie mapy */
    .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
        10%, 90% { transform: translate3d(-2px, 0, 0); }
        20%, 80% { transform: translate3d(4px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
        40%, 60% { transform: translate3d(6px, 0, 0); }
    }
    .leaflet-tooltip { background: #000; color: #fff; border: 1px solid #f00; font-size: 10px; }
</style>

</body>
</html>
