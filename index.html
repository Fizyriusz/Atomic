<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear Commander v4.0 - Tactical Interface</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --green: #00ff41; --red: #ff3333; --bg: #0a0a0c; --ui-bg: rgba(16, 16, 20, 0.95); }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Monaco, monospace; background: var(--bg); color: var(--green); overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }

        /* Panel UI */
        #ui {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: var(--ui-bg); border: 1px solid #333;
            padding: 15px; border-radius: 8px; width: 300px;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
        }
        h2 { margin: 0 0 15px; font-size: 1rem; color: var(--red); text-align: center; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        select, input, button {
            width: 100%; background: #1a1a1a; border: 1px solid #444; color: var(--green);
            padding: 10px; margin-bottom: 8px; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem;
        }

        /* Róża Wiatrów */
        .compass-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px;
        }
        .compass-btn {
            padding: 8px 0; font-size: 0.7rem; background: #222; border: 1px solid #444; 
            color: #888; cursor: pointer; transition: 0.2s;
        }
        .compass-btn.active { background: var(--green); color: black; border-color: var(--green); font-weight: bold; }
        .compass-btn:hover:not(.active) { border-color: var(--green); color: var(--green); }

        .btn-action { background: #333; border: none; color: white; cursor: pointer; font-weight: bold; }
        .btn-clear { background: #422; color: #ff5555; margin-top: 10px; }
        .btn-clear:hover { background: #622; }

        #log { 
            font-size: 0.7rem; background: rgba(0,0,0,0.5); padding: 8px; 
            border: 1px solid #222; max-height: 100px; overflow-y: auto; margin-top: 10px;
        }

        .leaflet-popup-content-wrapper { background: #111; color: var(--green); border: 1px solid var(--green); }
        .leaflet-popup-tip { background: var(--green); }
    </style>
</head>
<body>

<div id="ui">
    <h2>STRATEGIC CONTROL</h2>
    
    <span class="label">Arsenał:</span>
    <select id="bomb-preset" onchange="syncPreset()">
        <option value="0.02">Davy Crockett (0.02 kt)</option>
        <option value="15" selected>Little Boy (15 kt)</option>
        <option value="21">Fat Man (21 kt)</option>
        <option value="1200">B83 Nuclear Bomb (1.2 Mt)</option>
        <option value="15000">Castle Bravo (15 Mt)</option>
        <option value="50000">Car Bomba (50 Mt)</option>
        <option value="custom">-- WŁASNA MOC --</option>
    </select>
    <input type="number" id="custom-yield" value="15" placeholder="Wpisz moc w kt">

    <span class="label">Kierunek wiatru (róża):</span>
    <div class="compass-grid">
        <button class="compass-btn" onclick="setWind(315, this)">NW</button>
        <button class="compass-btn" onclick="setWind(0, this)">N</button>
        <button class="compass-btn" onclick="setWind(45, this)">NE</button>
        <button class="compass-btn" onclick="setWind(270, this)">W</button>
        <div style="background:none; border:none;"></div>
        <button class="compass-btn active" onclick="setWind(90, this)">E</button>
        <button class="compass-btn" onclick="setWind(225, this)">SW</button>
        <button class="compass-btn" onclick="setWind(180, this)">S</button>
        <button class="compass-btn" onclick="setWind(135, this)">SE</button>
    </div>

    <div id="log">SYSTEM READY. WAITING FOR TARGET.</div>

    <button class="btn-clear" onclick="clearMap()">RESETUJ MAPĘ</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([52.23, 21.01], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let activeLayers = [];
    let currentWind = 90;

    function syncPreset() {
        const val = document.getElementById('bomb-preset').value;
        if(val !== "custom") document.getElementById('custom-yield').value = val;
    }

    function setWind(deg, btn) {
        currentWind = deg;
        document.querySelectorAll('.compass-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function playSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = 'brownnoise'; // emulowane
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 2);
            osc.stop(ctx.currentTime + 2);
        } catch(e) {}
    }

    map.on('click', function(e) {
        const kt = parseFloat(document.getElementById('custom-yield').value) || 1;
        const pos = e.latlng;
        
        // Model fizyczny (skalowanie promieni)
        const sB = Math.pow(kt, 1/3); // Blast scale
        const sT = Math.pow(kt, 0.43); // Thermal scale (rośnie szybciej)

        // Definicje stref (metry)
        let rawZones = [
            { r: sB * 3300, col: '#555555', label: '1 PSI: Podmuch odczuwalny, pękające szyby', op: 0.1 },
            { r: sT * 1200, col: '#ffaa00', label: 'Ciepło: Oparzenia 3 stopnia (poważne)', op: 0.3 },
            { r: sB * 1100, col: '#ff4400', label: '5 PSI: Domy mieszkalne zniszczone', op: 0.35 },
            { r: sB * 450,  col: '#ff0000', label: '20 PSI: Totalna destrukcja betonu', op: 0.4 },
            { r: sB * 150,  col: '#ffff00', label: 'Kula ognia: Parowanie materii', op: 0.7 }
        ];

        // KLUCZOWE: Sortowanie od największego do najmniejszego promienia
        // Dzięki temu opisy i klikalność na mapie zawsze działają poprawnie.
        rawZones.sort((a, b) => b.r - a.r);

        // Efekt wstrząsu
        document.getElementById('map').style.filter = 'invert(1)';
        setTimeout(() => document.getElementById('map').style.filter = 'none', 100);
        playSound();

        // Rysowanie stref
        rawZones.forEach(z => {
            const c = L.circle(pos, {
                radius: 0, color: z.col, fillColor: z.col, fillOpacity: z.op, weight: 1
            }).addTo(map).bindPopup(`<b>${z.label}</b><br>Zasięg: ${(z.r/1000).toFixed(2)} km`);
            
            setTimeout(() => c.setRadius(z.r), 50);
            activeLayers.push(c);
        });

        // Fallout (Opad)
        const rad = (currentWind - 90) * (Math.PI / 180);
        const fLen = sB * 10000;
        const fEnd = [
            pos.lat - (fLen / 111000) * Math.sin(rad),
            pos.lng + (fLen / (111000 * Math.cos(pos.lat * Math.PI/180))) * Math.cos(rad)
        ];
        
        const fallout = L.polygon([
            pos,
            [pos.lat + (rawZones[0].r/111000), pos.lng],
            fEnd,
            [pos.lat - (rawZones[0].r/111000), pos.lng]
        ], { color: '#6b8e23', fillOpacity: 0.15, weight: 1, dashArray: '5,5' }).addTo(map)
        .bindPopup("Strefa opadu radioaktywnego (zależna od wiatru)");
        
        activeLayers.push(fallout);

        // Marker uderzenia
        const m = L.circleMarker(pos, { radius: 3, color: 'white' }).addTo(map);
        activeLayers.push(m);

        const log = document.getElementById('log');
        log.innerHTML = `> UDERZENIE: ${kt}kt<br>> KOORD: ${pos.lat.toFixed(2)}, ${pos.lng.toFixed(2)}<br>` + log.innerHTML;
    });

    function clearMap() {
        activeLayers.forEach(l => map.removeLayer(l));
        activeLayers = [];
        document.getElementById('log').innerHTML = "MAPA WYCZYSZCZONA.";
    }
</script>
</body>
</html>
