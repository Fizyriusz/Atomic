<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear Commander v6.0 - Tactical Strike</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --green: #00ff41; --red: #ff3333; --bg: #0a0a0c; --ui-bg: rgba(10, 10, 12, 0.95); }
        body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; background: var(--bg); color: var(--green); overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }

        /* UI Panel */
        #ui {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: var(--ui-bg); border: 2px solid #333;
            padding: 15px; border-radius: 4px; width: 300px;
            max-height: 95vh; overflow-y: auto; box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        
        h2 { margin: 0 0 10px; font-size: 1.1rem; color: var(--red); text-align: center; border-bottom: 2px solid var(--red); padding-bottom: 5px; }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin: 10px 0 4px; display: block; }
        
        select, input, button {
            width: 100%; background: #111; border: 1px solid #444; color: var(--green);
            padding: 10px; margin-bottom: 5px; border-radius: 4px; box-sizing: border-box;
        }

        /* Róża Wiatrów */
        .compass-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .compass-btn { padding: 8px 0; font-size: 0.7rem; background: #222; cursor: pointer; }
        .compass-btn.active { background: var(--green); color: black; font-weight: bold; }
        
        /* Przyciski Akcji */
        .btn-launch { background: var(--red); color: white; font-size: 1.2rem; font-weight: bold; border: none; margin-top: 15px; cursor: pointer; animation: pulse 1.5s infinite; }
        .btn-launch:disabled { background: #444; animation: none; cursor: not-allowed; }
        .btn-util { background: #222; color: #fff; font-size: 0.8rem; cursor: pointer; }
        .btn-clear { color: var(--red); border-color: #522; margin-top: 10px; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        /* Animacja spadającej bomby */
        .falling-bomb {
            position: absolute; width: 30px; height: 60px;
            background: url('https://cdn-icons-png.flaticon.com/512/2312/2312800.png'); /* Ikona pocisku */
            background-size: contain; background-repeat: no-repeat;
            z-index: 2000; pointer-events: none;
            filter: drop-shadow(0 0 5px red);
            transform: rotate(180deg);
        }

        @keyframes bomb-fall {
            0% { transform: translateY(-800px) rotate(180deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(0) rotate(180deg); }
        }

        #log { font-size: 0.7rem; background: #000; padding: 10px; border: 1px solid #222; margin-top: 10px; height: 100px; overflow-y: auto; border-left: 3px solid var(--red); }

        /* Map effects */
        .flash { animation: flash-anim 0.4s forwards; }
        @keyframes flash-anim { 0% { filter: brightness(10) invert(1); } 100% { filter: brightness(1) invert(0); } }
    </style>
</head>
<body>

<div id="ui">
    <h2>WAR TERMINAL v6.0</h2>
    
    <button class="btn-util" onclick="toggleMapMode()">📡 Tryb Satelitarny</button>
    <button class="btn-util" onclick="downloadReport()">📸 Generuj Raport</button>

    <span class="label">Wybierz Głowicę dla celów:</span>
    <select id="bomb-preset" onchange="syncPreset()">
        <option value="0.02">Davy Crockett (0.02 kt)</option>
        <option value="15" selected>Little Boy (15 kt)</option>
        <option value="350">W78 Minuteman (350 kt)</option>
        <option value="50000">Tsar Bomba (50 Mt)</option>
        <option value="custom">-- WŁASNA MOC --</option>
    </select>
    <input type="number" id="custom-yield" value="15">

    <span class="label">Kierunek Wiatru:</span>
    <div class="compass-grid">
        <button class="compass-btn" onclick="setWind(315, this)">NW</button>
        <button class="compass-btn" onclick="setWind(0, this)">N</button>
        <button class="compass-btn" onclick="setWind(45, this)">NE</button>
        <button class="compass-btn" onclick="setWind(270, this)">W</button>
        <div style="display:flex; align-items:center; justify-content:center; font-size:1.5rem;">🎯</div>
        <button class="compass-btn active" onclick="setWind(90, this)">E</button>
        <button class="compass-btn" onclick="setWind(225, this)">SW</button>
        <button class="compass-btn" onclick="setWind(180, this)">S</button>
        <button class="compass-btn" onclick="setWind(135, this)">SE</button>
    </div>

    <button id="launch-btn" class="btn-launch" onclick="startGlobalStrike()" disabled>ODPALAMY (0)</button>

    <div id="log">SYSTEM ONLINE. ZAZNACZ CELE NA MAPIE.</div>

    <button class="btn-util btn-clear" onclick="clearAll()">RESET SYSTEMU</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([52.23, 21.01], 6);
    const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { crossOrigin: 'anonymous' }).addTo(map);
    const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { crossOrigin: 'anonymous' });

    let isSatMode = false;
    let currentWind = 90;
    let pendingTargets = []; // Cele oczekujące
    let deployedLayers = []; // Wybuchy na mapie

    function toggleMapMode() {
        if(isSatMode) { map.removeLayer(satLayer); map.addLayer(darkLayer); }
        else { map.removeLayer(darkLayer); map.addLayer(satLayer); }
        isSatMode = !isSatMode;
    }

    function syncPreset() {
        const val = document.getElementById('bomb-preset').value;
        if(val !== "custom") document.getElementById('custom-yield').value = val;
    }

    function setWind(deg, btn) {
        currentWind = deg;
        document.querySelectorAll('.compass-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // Kliknięcie - teraz dodaje celownik zamiast wybuchu
    map.on('click', function(e) {
        const kt = parseFloat(document.getElementById('custom-yield').value) || 1;
        const targetMarker = L.circleMarker(e.latlng, {
            radius: 10, color: '#ff3333', weight: 2, fillColor: 'transparent', fillOpacity: 0
        }).addTo(map);
        
        // Dodanie małego "celownika" wewnątrz
        const cross = L.marker(e.latlng, {
            icon: L.divIcon({ className: '', html: '<div style="color:red; font-size:20px; font-weight:bold; margin-top:-12px; margin-left:-6px;">+</div>' })
        }).addTo(map);

        pendingTargets.push({ latlng: e.latlng, kt: kt, marker: targetMarker, cross: cross, wind: currentWind });
        
        updateUI();
        logMessage(`CEL ZAZNACZONY: [${e.latlng.lat.toFixed(2)}, ${e.latlng.lng.toFixed(2)}] (${kt} kt)`);
    });

    function updateUI() {
        const btn = document.getElementById('launch-btn');
        btn.innerText = `ODPALAMY (${pendingTargets.length})`;
        btn.disabled = pendingTargets.length === 0;
    }

    async function startGlobalStrike() {
        const btn = document.getElementById('launch-btn');
        btn.disabled = true;
        
        const targetsToStrike = [...pendingTargets];
        pendingTargets = [];
        updateUI();

        for (const target of targetsToStrike) {
            await dropBomb(target);
        }
    }

    function dropBomb(target) {
        return new Promise((resolve) => {
            const point = map.latLngToContainerPoint(target.latlng);
            const bombImg = document.createElement('div');
            bombImg.className = 'falling-bomb';
            bombImg.style.left = (point.x - 15) + 'px';
            bombImg.style.top = (point.y - 60) + 'px';
            bombImg.style.animation = 'bomb-fall 0.8s ease-in forwards';
            document.body.appendChild(bombImg);

            setTimeout(() => {
                document.body.removeChild(bombImg);
                executeExplosion(target);
                resolve();
            }, 800);
        });
    }

    function executeExplosion(target) {
        const { latlng, kt, marker, cross, wind } = target;
        map.removeLayer(marker);
        map.removeLayer(cross);

        // Błysk
        document.getElementById('map').classList.add('flash');
        setTimeout(() => document.getElementById('map').classList.remove('flash'), 400);
        playBoom();

        // Fizyka
        const sB = Math.pow(kt, 1/3);
        const sT = Math.pow(kt, 0.43);

        const zones = [
            { r: sB * 3300, col: '#555', label: '1 PSI: Podmuch' },
            { r: sT * 1200, col: '#ffaa00', label: 'Ciepło' },
            { r: sB * 1100, col: '#ff4400', label: '5 PSI: Zniszczenia' },
            { r: sB * 450,  col: '#f00', label: '20 PSI: Totalne' },
            { r: sB * 150,  col: '#ff0', label: 'Kula ognia' }
        ].sort((a,b) => b.r - a.r);

        zones.forEach(z => {
            const c = L.circle(latlng, { radius: z.r, color: z.col, weight: 1, fillOpacity: 0.3 }).addTo(map);
            deployedLayers.push(c);
        });

        // Fallout
        const rad = (wind - 90) * (Math.PI / 180);
        const fLen = sB * 12000;
        const fEnd = [latlng.lat - (fLen/111000)*Math.sin(rad), latlng.lng + (fLen/111000)*Math.cos(rad)];
        const fallout = L.polygon([latlng, [latlng.lat + 0.01, latlng.lng], fEnd, [latlng.lat - 0.01, latlng.lng]], 
            {color: '#6b8e23', fillOpacity: 0.2, weight: 1, dashArray: '5,5'}).addTo(map);
        deployedLayers.push(fallout);

        logMessage(`<span style="color:red">DETONACJA: ${kt}kt - Ofiary szacowane: ${Math.floor(sB * 150000).toLocaleString()}</span>`);
    }

    function playBoom() {
        try {
            const ctx = new AudioContext();
            const g = ctx.createGain();
            const o = ctx.createOscillator();
            o.type = 'sawtooth'; o.frequency.setValueAtTime(40, ctx.currentTime);
            o.connect(g); g.connect(ctx.destination);
            o.start(); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1); o.stop(ctx.currentTime + 1);
        } catch(e) {}
    }

    function logMessage(msg) {
        const log = document.getElementById('log');
        log.innerHTML = `> ${msg}<br>` + log.innerHTML;
    }

    function clearAll() {
        pendingTargets.forEach(t => { map.removeLayer(t.marker); map.removeLayer(t.cross); });
        deployedLayers.forEach(l => map.removeLayer(l));
        pendingTargets = []; deployedLayers = [];
        updateUI();
        document.getElementById('log').innerHTML = "SYSTEM RESET.";
    }

    function downloadReport() {
        html2canvas(document.body).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Nuke-Report.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
